version: "3.9"

networks:
  smart-campus-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: sc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartcampus
      POSTGRES_USER: scadmin
      POSTGRES_PASSWORD: scpassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - smart-campus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scadmin -d smartcampus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sc_redis
    restart: unless-stopped
    command: redis-server --requirepass redispassword123 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smart-campus-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispassword123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sc_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # Apuntamos al hostname del servicio dentro de la red de compose
      DATABASE_URL: "postgresql+asyncpg://scadmin:scpassword123@postgres:5432/smartcampus"
      REDIS_URL: "redis://:redispassword123@redis:6379/0"
      # Polling para que --reload funcione bien con bind mount en Windows
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      # Codigo del backend para hot-reload con uvicorn --reload
      - ./backend:/app/backend
      # Volumen anonimo: oculta el venv/ del host (que es para Windows y
      # ademas dispara el "Cannot allocate memory" del watcher al tener
      # miles de archivos).
      - /app/backend/venv
      - /app/backend/__pycache__
      # Las llaves RS256 viven fuera de smart-campus/, las montamos read-only.
      # Path("../infra/certs/...") desde /app/backend resuelve a /app/infra/certs/.
      - ../infra:/app/infra:ro
    networks:
      - smart-campus-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sc_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      # Bind mount del codigo para hot-reload
      - ./frontend:/app
      # Volumen anonimo: evita que el bind mount aplaste node_modules
      # del contenedor (que se construyo para Linux dentro de la imagen).
      - /app/node_modules
    environment:
      # Polling para que Vite detecte cambios desde un FS montado en Windows
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    networks:
      - smart-campus-net
