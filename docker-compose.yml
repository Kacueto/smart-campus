version: "3.9"

networks:
  smart-campus-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:

services:

  postgres:
    image: postgres:16-alpine
    container_name: sc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartcampus
      POSTGRES_USER: scadmin
      POSTGRES_PASSWORD: scpassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - smart-campus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scadmin -d smartcampus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sc_redis
    restart: unless-stopped
    command: redis-server --requirepass redispassword123 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smart-campus-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispassword123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: sc_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./mqtt-broker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mqtt-broker/certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - smart-campus-net
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t test -m ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sc_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://scadmin:scpassword123@sc_postgres:5432/smartcampus
      REDIS_URL: redis://:redispassword123@sc_redis:6379/0
      MQTT_BROKER_HOST: sc_mosquitto
      MQTT_BROKER_PORT: "8883"
      JWT_PRIVATE_KEY_PATH: /certs/private.pem
      JWT_PUBLIC_KEY_PATH: /certs/public.pem
      JWT_AES_KEY_PATH: /certs/aes.key
      MQTT_CA_CERT: /certs/mqtt-ca.crt
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - smart-campus-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: sc_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - smart-campus-net
